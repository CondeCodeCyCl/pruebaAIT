spring.application.name=order-msv

server.port=${PORT:8082}

#spring.datasource.url=${DB_URL:jdbc:oracle:thin:@//localhost:1521/FREEPDB1}
# Apuntamos a Oracle usando la puerta trasera de Docker (host.docker.internal)
spring.datasource.url=${DB_URL:jdbc:oracle:thin:@//host.docker.internal:1521/FREEPDB1}
spring.datasource.username=${DB_USER:ait_order}
spring.datasource.password=${DB_PASS:admin123}

spring.datasource.driver-class-name=oracle.jdbc.OracleDriver

#spring.jpa.hibernate.ddl-auto=validate
spring.jpa.hibernate.ddl-auto=update

#eureka.client.service-url.defaultZone=http://localhost:8761/eureka
# Apuntamos a Eureka por el nombre de su contenedor en la red de Docker
eureka.client.service-url.defaultZone=http://eureka-server:8761/eureka
eureka.instance.instance-id=${spring.application.name}:${random.value}